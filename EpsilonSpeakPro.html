<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Epsilon Speak Pro</title>
<style>
  :root{
    --navy:#1f3864; --blue:#2e75b6; --light:#d5e8f0; --grey:#f2f4f7;
    --green:#1e8e5a; --amber:#c98a00; --red:#c0392b; --ink:#1c2430; --muted:#667085;
    --line:#e3e8ef; --radius:14px; --shadow:0 6px 24px rgba(20,40,80,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:#eef2f7;}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-size:15px;padding:11px 18px;transition:.15s;}
  button:active{transform:translateY(1px)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .btn-primary{background:var(--navy);color:#fff;font-weight:600}
  .btn-primary:hover{background:#16294d}
  .btn-blue{background:var(--blue);color:#fff;font-weight:600}
  .btn-blue:hover{background:#256099}
  .btn-ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--grey)}
  .btn-danger{background:#fff;color:var(--red);border:1px solid #f0c4be}
  .btn-danger:hover{background:#fdecea}
  input,textarea,select{font-family:inherit;font-size:15px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;width:100%;background:#fff;color:var(--ink)}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,117,182,.15)}
  label{font-size:13px;font-weight:600;color:var(--muted);display:block;margin:0 0 6px}
  .field{margin-bottom:16px}
  .hidden{display:none!important}
  .card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:26px}
  .wrap{max-width:1060px;margin:0 auto;padding:24px}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700}
  .muted{color:var(--muted)}
  h1,h2,h3{color:var(--navy);margin:0 0 12px}
  /* top bar */
  .topbar{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:13px 26px}
  .topbar .brand{font-weight:800;letter-spacing:.5px;font-size:18px}
  .topbar .brand small{font-weight:500;opacity:.8;letter-spacing:0}
  .topbar .who{font-size:14px;opacity:.95;display:flex;align-items:center;gap:14px}
  /* login */
  .login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1f3864,#2e75b6);padding:20px}
  .login-card{width:100%;max-width:430px;background:#fff;border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.25);padding:34px}
  .logo{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#2e75b6,#1f3864);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:24px;margin-bottom:14px}
  .tabs{display:flex;gap:8px;background:var(--grey);padding:5px;border-radius:12px;margin-bottom:22px}
  .tabs button{flex:1;background:transparent;color:var(--muted);font-weight:600}
  .tabs button.active{background:#fff;color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .hint{font-size:12.5px;color:var(--muted);background:var(--grey);border-radius:10px;padding:10px 12px;margin-top:14px;line-height:1.5}
  /* table */
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px;padding:10px 12px;border-bottom:2px solid var(--line)}
  td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:hover td{background:#fafbfd}
  /* stage / interviewer */
  .stage{display:flex;gap:24px;flex-wrap:wrap}
  .avatar-wrap{flex:1;min-width:300px;background:linear-gradient(160deg,#27374f,#0d1726);border-radius:18px;padding:22px;color:#fff;position:relative;overflow:hidden;min-height:420px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
  .avatar-wrap::after{content:"● REC";position:absolute;top:14px;right:16px;font-size:11px;font-weight:700;color:#ff5b5b;letter-spacing:1px;opacity:.0;transition:.3s}
  .avatar-wrap.live::after{opacity:1;animation:blink 1.2s infinite}
  #face{width:230px;height:270px;filter:drop-shadow(0 10px 30px rgba(0,0,0,.45))}
  #head{transform-origin:120px 150px;animation:sway 6s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-1.2deg) translateY(0)}50%{transform:rotate(1.2deg) translateY(-3px)}}
  .status-chip{margin-top:6px;background:rgba(255,255,255,.12);border-radius:999px;padding:7px 16px;font-size:13px;display:flex;align-items:center;gap:8px}
  .dot{width:9px;height:9px;border-radius:50%;background:#37d67a;animation:blink 1.2s infinite}
  @keyframes blink{50%{opacity:.3}}
  .speech-bubble{background:rgba(255,255,255,.96);color:var(--ink);border-radius:14px;padding:13px 16px;margin-top:16px;font-size:15px;line-height:1.5;max-width:330px;text-align:center;min-height:24px;box-shadow:0 4px 14px rgba(0,0,0,.2)}
  .panel{flex:1.25;min-width:300px}
  .passage{background:var(--grey);border-left:4px solid var(--blue);border-radius:10px;padding:18px;font-size:17px;line-height:1.7;max-height:260px;overflow:auto}
  .transcript{background:#fff;border:1px dashed var(--line);border-radius:10px;padding:14px;min-height:64px;font-size:15px;line-height:1.6}
  .mic-btn{width:74px;height:74px;border-radius:50%;background:var(--blue);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 6px 18px rgba(46,117,182,.4);user-select:none}
  .mic-btn.rec{background:var(--red);animation:recpulse 1s infinite}
  @keyframes recpulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,.5)}50%{box-shadow:0 0 0 14px rgba(192,57,43,0)}}
  .stepbar{display:flex;gap:8px;margin-bottom:22px}
  .step{flex:1;height:6px;border-radius:6px;background:var(--line)}
  .step.done{background:var(--green)}.step.active{background:var(--blue)}
  .band-big{font-size:62px;font-weight:800;line-height:1}
  .scorecard{flex:1;min-width:160px;text-align:center;padding:18px;border-radius:14px;background:var(--grey)}
  .criteria{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
  .meter{height:8px;background:var(--line);border-radius:6px;overflow:hidden;width:120px}
  .meter>i{display:block;height:100%;background:var(--blue)}
  .empty{text-align:center;color:var(--muted);padding:40px}
  .gridform{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:640px){.gridform{grid-template-columns:1fr}}
  .qcard{border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;background:#fdfefe}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login" class="login-bg">
  <div class="login-card">
    <div class="logo">E</div>
    <h1 style="margin-bottom:2px">Epsilon Speak Pro</h1>
    <p class="muted" style="margin-top:0">AI English Speaking &amp; Assessment</p>
    <div class="tabs">
      <button id="tabStudent" class="active" onclick="setRole('student')">Student</button>
      <button id="tabAdmin" onclick="setRole('admin')">Admin</button>
    </div>
    <div class="field"><label>Username</label><input id="loginUser" placeholder="Enter username"/></div>
    <div class="field"><label>Password</label><input id="loginPass" type="password" placeholder="Enter password"/></div>
    <button class="btn-primary" style="width:100%" onclick="doLogin()">Log in</button>
    <p id="loginErr" class="muted" style="color:var(--red);min-height:18px;margin:10px 0 0;font-size:13px"></p>
    <div class="hint" id="loginHint"></div>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand">EPSILON SPEAK PRO &nbsp;<small id="roleLabel"></small></div>
    <div class="who"><span id="whoami"></span><button class="btn-ghost" style="padding:7px 14px" onclick="logout()">Log out</button></div>
  </div>
  <div class="wrap" id="view"></div>
</div>

<script>
/* ========================================================================
   DATA LAYER
   ======================================================================== */
const DB = {
  load(){ let d=null; try{d=JSON.parse(localStorage.getItem('esp_db'));}catch(e){} if(!d){d=seed();this.save(d);} return d; },
  save(d){ localStorage.setItem('esp_db', JSON.stringify(d)); },
};
function seed(){
  return {
    users:[
      {u:'admin',p:'admin',role:'admin',name:'Administrator'},
      {u:'student',p:'1234',role:'student',name:'Demo Student',testId:'t1',slot:''},
    ],
    tests:[{
      id:'t1', name:'IELTS Practice — Set A', slot:'',
      passage:"Technology has transformed the way we live and work. Over the past two decades, the rapid growth of the internet has connected people across the world, making information available at the touch of a button. While these changes bring many benefits, they also raise important questions about privacy, attention, and the future of human relationships.",
      questions:[
        {topic:"Describe a skill you would like to learn.", reference:"I would really like to learn how to play the piano. I have always been drawn to music because it allows people to express emotions that are difficult to put into words. Learning the piano would require patience and daily practice, but I believe the sense of achievement would be deeply rewarding."},
        {topic:"Do you think people rely too much on technology? Why?", reference:"In my opinion, many people have become overly dependent on technology in their daily lives. We use our phones for navigation, communication, and even simple calculations, which can weaken certain skills over time. However, technology also empowers us, so the key is finding a healthy balance."}
      ],
    }],
    results:[],
  };
}
let db = DB.load();
let session=null, loginRole='student';

/* ========================================================================
   AUTH
   ======================================================================== */
function setRole(r){
  loginRole=r;
  tabStudent.classList.toggle('active',r==='student');
  tabAdmin.classList.toggle('active',r==='admin');
  loginHint.innerHTML = r==='admin'
    ? "Demo admin login &nbsp;→&nbsp; <b>admin</b> / <b>admin</b>"
    : "Demo student login &nbsp;→&nbsp; <b>student</b> / <b>1234</b>";
}
function doLogin(){
  const u=loginUser.value.trim(), p=loginPass.value;
  const user=db.users.find(x=>x.u===u&&x.p===p&&x.role===loginRole);
  if(!user){ loginErr.textContent="Invalid username or password for this role."; return; }
  loginErr.textContent=""; session={u:user.u,role:user.role,name:user.name};
  login.classList.add('hidden'); app.classList.remove('hidden');
  roleLabel.textContent = user.role==='admin'?'Admin Panel':'Student';
  whoami.textContent=user.name;
  user.role==='admin'?renderAdmin():renderStudentHome();
}
function logout(){ session=null; app.classList.add('hidden'); login.classList.remove('hidden'); loginUser.value=''; loginPass.value=''; try{speechSynthesis.cancel();}catch(e){} stopRecognition(); }
setRole('student');

/* ========================================================================
   ADMIN PANEL
   ======================================================================== */
let adminTab='tests';
function renderAdmin(){
  document.getElementById('view').innerHTML=`
   <div class="row" style="margin-bottom:18px">
     <button class="${adminTab==='tests'?'btn-blue':'btn-ghost'}" onclick="adminTab='tests';renderAdmin()">Tests</button>
     <button class="${adminTab==='students'?'btn-blue':'btn-ghost'}" onclick="adminTab='students';renderAdmin()">Students</button>
     <button class="${adminTab==='results'?'btn-blue':'btn-ghost'}" onclick="adminTab='results';renderAdmin()">Results</button>
     <button class="${adminTab==='settings'?'btn-blue':'btn-ghost'}" onclick="adminTab='settings';renderAdmin()">AI &amp; Avatar</button>
   </div><div id="adminBody"></div>`;
  if(adminTab==='tests')adminTests(); if(adminTab==='students')adminStudents(); if(adminTab==='results')adminResults(); if(adminTab==='settings')adminSettings();
}
function adminSettings(){
  const s=db.settings;
  document.getElementById('adminBody').innerHTML=`
    <div class="card" style="margin-bottom:18px"><h2>AI examiner model</h2>
      <p class="muted">Connect an OpenAI-compatible model — local <b>Ollama</b> / <b>LM Studio</b>, or a cloud endpoint. When set, final speaking scores are produced by this model against the official IELTS band descriptors; otherwise the built-in engine is used.</p>
      <div class="gridform">
        <div class="field"><label>API URL (chat completions)</label><input id="llmUrl" value="${esc(s.llmUrl)}" placeholder="http://localhost:11434/v1/chat/completions"/></div>
        <div class="field"><label>Model name</label><input id="llmModel" value="${esc(s.llmModel)}" placeholder="llama3.1   /   gpt-4o-mini"/></div></div>
      <div class="field"><label>API key (optional — for cloud endpoints)</label><input id="llmKey" value="${esc(s.llmKey)}" placeholder="leave blank for local Ollama"/></div>
      <div class="row"><button class="btn-primary" onclick="saveSettings()">Save</button><button class="btn-ghost" onclick="testLLM()">Test connection</button></div>
      <p id="llmTest" class="muted" style="margin-top:10px;min-height:18px"></p>
      <p class="muted" style="font-size:12.5px">Tip: local Ollama must allow browser calls — start it with <code>OLLAMA_ORIGINS=*</code>. Most cloud APIs block direct browser calls (CORS) and need the small proxy in the <b>metahuman-server</b> folder.</p></div>
    <div class="card"><h2>Unreal MetaHuman interviewer</h2>
      <p class="muted">Paste the <b>Pixel Streaming</b> player URL served by your Unreal MetaHuman server. When set, the interview shows the live photoreal MetaHuman instead of the built-in 2D presenter. Full setup is in the <b>metahuman-server</b> folder.</p>
      <div class="field"><label>Pixel Streaming URL</label><input id="psUrl" value="${esc(s.psUrl)}" placeholder="https://your-host:port/   (Epic Pixel Streaming web client)"/></div>
      <button class="btn-primary" onclick="saveSettings()">Save</button></div>`;
}
function saveSettings(){ const g=id=>{const e=document.getElementById(id);return e?e.value.trim():null;};
  const v=(id,cur)=>{const x=g(id);return x===null?cur:x;};
  db.settings={llmUrl:v('llmUrl',db.settings.llmUrl),llmModel:v('llmModel',db.settings.llmModel),llmKey:v('llmKey',db.settings.llmKey),psUrl:v('psUrl',db.settings.psUrl)};
  DB.save(db); const t=document.getElementById('llmTest'); if(t)t.textContent='Saved.'; }
async function testLLM(){ saveSettings(); const el=document.getElementById('llmTest'); el.textContent='Testing…';
  const r=await llmRaw('Reply with the single word: OK'); el.textContent = r!=null ? ('✓ Model responded: '+String(r).slice(0,80)) : '✗ No response — check the URL, model name, and CORS (local Ollama needs OLLAMA_ORIGINS=*).'; }
function adminTests(){
  document.getElementById('adminBody').innerHTML=`
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center">
        <h2 style="margin:0">Tests</h2><button class="btn-primary" onclick="editTest()">+ Create test</button></div>
      <table style="margin-top:14px">
        <thead><tr><th>Name</th><th>Reading</th><th>Speaking topics</th><th>Time slot</th><th></th></tr></thead>
        <tbody>${db.tests.map(t=>`<tr><td><b>${esc(t.name)}</b></td>
          <td>${t.passage?'<span class="pill" style="background:var(--light);color:var(--navy)">Set</span>':'<span class="muted">—</span>'}</td>
          <td>${t.questions.length} topic(s)</td><td>${t.slot?esc(t.slot):'<span class="muted">Anytime</span>'}</td>
          <td style="text-align:right"><button class="btn-ghost" onclick="editTest('${t.id}')">Edit</button>
          <button class="btn-danger" onclick="delTest('${t.id}')">Delete</button></td></tr>`).join('')||
          `<tr><td colspan="5" class="empty">No tests yet.</td></tr>`}</tbody></table></div>`;
}
function delTest(id){ if(!confirm('Delete this test?'))return; db.tests=db.tests.filter(t=>t.id!==id); DB.save(db); adminTests(); }
let draftQs=[];
function editTest(id){
  const t=id?db.tests.find(x=>x.id===id):{id:'t'+Date.now(),name:'',slot:'',passage:'',questions:[{topic:'',reference:''}]};
  document.getElementById('adminBody').innerHTML=`
    <div class="card"><h2>${id?'Edit test':'Create test'}</h2>
      <div class="gridform">
        <div class="field"><label>Test name</label><input id="tName" value="${esc(t.name)}" placeholder="e.g. IELTS Practice — Set B"/></div>
        <div class="field"><label>Time slot (optional)</label><input id="tSlot" value="${esc(t.slot)}" placeholder="e.g. 24 Jun 2026, 3:00 PM"/></div></div>
      <div class="field"><label>Reading passage (student reads aloud)</label>
        <textarea id="tPassage" rows="5" placeholder="Paste the passage...">${esc(t.passage)}</textarea></div>
      <label>Speaking topics &amp; reference answers</label><div id="qList"></div>
      <button class="btn-ghost" onclick="addQ()">+ Add speaking topic</button>
      <div class="row" style="margin-top:20px"><button class="btn-primary" onclick="saveTest('${t.id}')">Save test</button>
        <button class="btn-ghost" onclick="adminTab='tests';renderAdmin()">Cancel</button></div></div>`;
  draftQs=JSON.parse(JSON.stringify(t.questions.length?t.questions:[{topic:'',reference:''}])); renderQs();
}
function renderQs(){
  document.getElementById('qList').innerHTML=draftQs.map((q,i)=>`
    <div class="qcard"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:8px">
      <b class="muted">Topic ${i+1}</b>${draftQs.length>1?`<button class="btn-danger" style="padding:5px 10px" onclick="rmQ(${i})">Remove</button>`:''}</div>
      <div class="field"><input oninput="draftQs[${i}].topic=this.value" value="${esc(q.topic)}" placeholder="Speaking question / topic"/></div>
      <div class="field" style="margin-bottom:0"><textarea rows="2" oninput="draftQs[${i}].reference=this.value" placeholder="Reference answer (guides AI scoring)">${esc(q.reference)}</textarea></div></div>`).join('');
}
function addQ(){draftQs.push({topic:'',reference:''});renderQs();}
function rmQ(i){draftQs.splice(i,1);renderQs();}
function saveTest(id){
  const name=document.getElementById('tName').value.trim(); if(!name){alert('Enter a test name.');return;}
  const obj={id,name,slot:document.getElementById('tSlot').value.trim(),passage:document.getElementById('tPassage').value.trim(),questions:draftQs.filter(q=>q.topic.trim())};
  const ix=db.tests.findIndex(t=>t.id===id); ix>=0?db.tests[ix]=obj:db.tests.push(obj);
  DB.save(db); adminTab='tests'; renderAdmin();
}
function adminStudents(){
  const studs=db.users.filter(u=>u.role==='student');
  document.getElementById('adminBody').innerHTML=`
    <div class="card" style="margin-bottom:18px"><h2>Add / assign student</h2>
      <div class="gridform">
        <div class="field"><label>Full name</label><input id="sName" placeholder="Student name"/></div>
        <div class="field"><label>Username</label><input id="sUser" placeholder="login username"/></div>
        <div class="field"><label>Password</label><input id="sPass" placeholder="login password"/></div>
        <div class="field"><label>Assign test</label><select id="sTest">${db.tests.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select></div></div>
      <button class="btn-primary" onclick="addStudent()">Create student login</button></div>
    <div class="card"><h2>Students</h2>
      <table><thead><tr><th>Name</th><th>Username</th><th>Assigned test</th><th>Status</th></tr></thead>
      <tbody>${studs.map(s=>{const t=db.tests.find(x=>x.id===s.testId);const done=db.results.some(r=>r.user===s.u);
        return `<tr><td><b>${esc(s.name)}</b></td><td>${esc(s.u)}</td><td>${t?esc(t.name):'<span class="muted">—</span>'}</td>
        <td>${done?'<span class="pill" style="background:#e3f6ec;color:var(--green)">Completed</span>':'<span class="pill" style="background:#fff4e0;color:var(--amber)">Pending</span>'}</td></tr>`;
      }).join('')||`<tr><td colspan="4" class="empty">No students yet.</td></tr>`}</tbody></table></div>`;
}
function addStudent(){
  const name=sName.value.trim(),u=sUser.value.trim(),p=sPass.value.trim(),testId=sTest.value;
  if(!name||!u||!p){alert('Fill name, username and password.');return;}
  if(db.users.some(x=>x.u===u)){alert('Username already exists.');return;}
  db.users.push({u,p,role:'student',name,testId,slot:''}); DB.save(db); adminStudents();
}
function adminResults(){
  document.getElementById('adminBody').innerHTML=`<div class="card"><h2>Results</h2>
    <table><thead><tr><th>Student</th><th>Test</th><th>Reading</th><th>Speaking</th><th>Overall</th><th>Date</th><th></th></tr></thead>
    <tbody>${db.results.slice().reverse().map((r,i)=>`<tr><td><b>${esc(r.name)}</b></td><td>${esc(r.testName)}</td>
      <td>${bandPill(r.reading.band)}</td><td>${bandPill(r.speaking.band)}</td><td><b>${bandPill(r.overall)}</b></td>
      <td class="muted">${new Date(r.date).toLocaleString()}</td>
      <td style="text-align:right"><button class="btn-ghost" onclick="viewResult(${db.results.length-1-i})">View</button></td></tr>`).join('')
      ||`<tr><td colspan="7" class="empty">No results yet.</td></tr>`}</tbody></table></div>`;
}
function viewResult(ix){ renderReport(db.results[ix], true); }

/* ========================================================================
   STUDENT HOME
   ======================================================================== */
function renderStudentHome(){
  const me=db.users.find(u=>u.u===session.u), t=db.tests.find(x=>x.id===me.testId), prev=db.results.filter(r=>r.user===session.u);
  document.getElementById('view').innerHTML=`
    <div class="card" style="margin-bottom:18px"><h1>Welcome, ${esc(me.name)} 👋</h1>
      ${t?`<p class="muted">Enable your microphone, then begin when ready. Best experienced in Google Chrome.</p>
        <div class="card" style="background:var(--grey);box-shadow:none;border:1px solid var(--line)">
          <div class="row" style="justify-content:space-between;align-items:center">
            <div><h3 style="margin:0">${esc(t.name)}</h3>
            <p class="muted" style="margin:4px 0 0">Reading (read-aloud) + Speaking · ${t.questions.length} topic(s) ${t.slot?'· Slot: '+esc(t.slot):''}</p></div>
            <button class="btn-primary" onclick="startTest('${t.id}')">Start test ▶</button></div></div>`
      :`<p class="empty">No test assigned yet. Please contact your administrator.</p>`}</div>
    ${prev.length?`<div class="card"><h2>Your past results</h2>
      <table><thead><tr><th>Test</th><th>Overall band</th><th>Date</th><th></th></tr></thead>
      <tbody>${prev.slice().reverse().map(r=>{const gi=db.results.indexOf(r);
        return `<tr><td>${esc(r.testName)}</td><td>${bandPill(r.overall)}</td><td class="muted">${new Date(r.date).toLocaleString()}</td>

  recConfidence=0; recStart=Date.now(); recDuration=0;

    const l=document.getElementById('liveT');

  }
  try{
    rec=new SR(); rec.continuous=true; rec.interimResults=true; rec.lang='en-US';
    let finalT='', cs=0, cc=0;
    rec.onresult=e=>{ let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){ const res=e.results[i], tr=res[0].transcript;
        if(res.isFinal){ finalT+=tr+' '; if(res[0].confidence>0){cs+=res[0].confidence;cc++;} } else interim+=tr; }

    rec.onerror=()=>{};

    recActive=true; rec.start();

}

function llmConfigured(){ return !!(db.settings.llmUrl && db.settings.llmModel); }

async function llmChat(messages){
  if(!db.settings.llmUrl||!db.settings.llmModel) return null;

    const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),90000);

      body:JSON.stringify({model:db.settings.llmModel,temperature:0,stream:false,messages})});

}
async function llmRaw(text){ return llmChat([{role:'user',content:text}]); }
async function llmExamine(answers, asrConf){
  const sys="You are a certified IELTS Speaking examiner. Score strictly using the official IELTS Speaking band descriptors (public version), bands 1-9 with half-bands allowed, on four criteria: fluency_coherence, lexical_resource, grammatical_range_accuracy, pronunciation. Judge only the candidate's own language; the reference answer is a guide to a strong response, not a required match. The candidate text comes from automatic speech recognition, so judge pronunciation conservatively using the asr_confidence value (0-1) provided. Return ONLY valid minified JSON, no commentary.";
  const shape='{"answers":[{"fluency_coherence":0,"lexical_resource":0,"grammatical_range_accuracy":0,"pronunciation":0,"band":0,"comment":""}],"overall":{"fluency_coherence":0,"lexical_resource":0,"grammatical_range_accuracy":0,"pronunciation":0,"band":0},"feedback":["",""]}';
  const payload={asr_confidence:Math.round((asrConf||0)*100)/100, answers:answers.map(a=>({question:a.topic,reference_strong_answer:a.reference,candidate_answer:a.answer}))};
  const raw=await llmChat([{role:'system',content:sys},{role:'user',content:"Return JSON exactly in this shape (all numbers are IELTS bands 1-9):\n"+shape+"\n\nScore this candidate:\n"+JSON.stringify(payload)}]);
  if(!raw) return null;
  try{ const m=raw.match(/\{[\s\S]*\}/); if(!m) return null; const j=JSON.parse(m[0]); return j&&j.overall?j:null; }catch(e){ return null; }

/* ========================================================================
   SCORING ENGINE (heuristic fallback: pronunciation, relevance, fluency)
   ======================================================================== */
const STOP=new Set("the a an and or but to of in on for with that this is are was were be been being it its as at by from we you they he she i my your our their have has had do does did not so if then than too very just can could would should will".split(' '));
const FILLERS=['um','uh','er','erm','hmm','like','you know','actually','basically'];
function words(s){ return (s||'').toLowerCase().replace(/[^a-z'\s]/g,' ').split(/\s+/).filter(Boolean); }
function keywords(s){ return words(s).filter(w=>w.length>3&&!STOP.has(w)); }
function clampBand(x){ return Math.max(3,Math.min(9,Math.round(x*2)/2)); }
function c9(v){ return Math.max(3,Math.min(9,v)); }
function r1(x){ return Math.round(x*2)/2; }
function scoreReading(passage,spoken,conf,dur){
  const P=words(passage), S=words(spoken);
  if(!P.length||!S.length) return {band:clampBand(4),accuracy:0,coverage:0,wordsRead:S.length,pron:r1(conf>0?c9(3+conf*6):5),wpm:0};
  const tmp={}; P.forEach(w=>tmp[w]=(tmp[w]||0)+1);
  let hit=0; S.forEach(w=>{ if(tmp[w]>0){hit++;tmp[w]--;} });
  const accuracy=Math.round(100*hit/S.length), coverage=Math.round(100*hit/P.length);
  const wpm=dur>0?Math.round(S.length/(dur/60)):0;
  const pron=conf>0?c9(3+conf*6):c9(4+accuracy/100*4);
  const paceBonus=(wpm>=110&&wpm<=180)?0.5:(wpm>0?-0.3:0);
  const base=3.0 + accuracy/100*2.6 + coverage/100*2.0 + (pron-5)*0.3 + paceBonus;
  return {band:clampBand(base),accuracy,coverage,wordsRead:S.length,pron:r1(pron),wpm};
}
function scoreSpeaking(answer,q,conf,dur){
  const W=words(answer), n=W.length;
  if(n<3) return {words:n,relevance:0,diversity:0,wpm:0,fluency:3,lexical:3,grammar:3,pron:3,coherence:3,band:3};
  const uniq=new Set(W).size, diversity=uniq/n;
  const sentences=(answer.match(/[.!?]+/g)||[]).length||Math.max(1,Math.round(n/14));
  const avgLen=n/sentences;
  let fillerCount=0; FILLERS.forEach(f=>{ const re=new RegExp('\\b'+f.replace(' ','\\s+')+'\\b','g'); fillerCount+=(answer.toLowerCase().match(re)||[]).length; });
  const fillerRate=fillerCount/n;
  const wpm=dur>0?Math.round(n/(dur/60)):0;
  const aSet=new Set(keywords(answer)), qk=keywords(q.topic), rk=keywords(q.reference);

  let pron     = 3 + conf01*6 - fillerRate*4;
  let coherence= 3 + relevance*5.5;
  fluency=c9(fluency);lexical=c9(lexical);grammar=c9(grammar);pron=c9(pron);coherence=c9(coherence);
  const band=clampBand((fluency+lexical+grammar+pron+coherence)/5);

function avg(a){ return a.reduce((x,y)=>x+y,0)/a.length; }
function buildResult(){

    lexical:r1(avg(speakAnswers.map(a=>a.score.lexical))),
    grammar:r1(avg(speakAnswers.map(a=>a.score.grammar))),
    pron:r1(avg(speakAnswers.map(a=>a.score.pron))),
  }:null;
  const relAvg=sB.length?avg(speakAnswers.map(a=>a.score.relevance)):0;
  const speaking={band:sB.length?clampBand(avg(sB)):0,criteria:crit,answers:speakAnswers,relevance:Math.round(relAvg*100)};
  const haveR=!!T.passage, haveS=sB.length>0;
  const overall=haveR&&haveS?clampBand((reading.band+speaking.band)/2):(haveR?reading.band:speaking.band);

  return {user:session.u,name:me?me.name:session.name,testId:T.id,testName:T.name,date:Date.now(),

async function buildResultLLM(){
  const reading=scoreReading(T.passage,readingTranscript,readingConf,readingDur);
  const j=await llmExamine(speakAnswers, recConfidence);
  if(!j||!j.overall) return null;
  const o=j.overall;
  const crit={fluency:r1(c9(num(o.fluency_coherence))),lexical:r1(c9(num(o.lexical_resource))),
    grammar:r1(c9(num(o.grammatical_range_accuracy))),pron:r1(c9(num(o.pronunciation)))};
  const sBand=clampBand(num(o.band)|| (crit.fluency+crit.lexical+crit.grammar+crit.pron)/4);
  const answers=speakAnswers.map((a,i)=>{ const ja=(j.answers&&j.answers[i])||{};
    return Object.assign({},a,{comment:ja.comment||'',score:Object.assign({},a.score,{
      fluency:r1(c9(num(ja.fluency_coherence)||a.score.fluency)),
      lexical:r1(c9(num(ja.lexical_resource)||a.score.lexical)),
      grammar:r1(c9(num(ja.grammatical_range_accuracy)||a.score.grammar)),
      pron:r1(c9(num(ja.pronunciation)||a.score.pron)),
      coherence:a.score.coherence,
      band:clampBand(num(ja.band)||a.score.band)})}); });
  const speaking={band:sBand,criteria:crit,answers,relevance:Math.round(avg(speakAnswers.map(a=>a.score.relevance))*100)};
  const haveR=!!T.passage;
  const overall=haveR&&answers.length?clampBand((reading.band+sBand)/2):(haveR?reading.band:sBand);
  const fb=(Array.isArray(j.feedback)&&j.feedback.filter(Boolean).length)?j.feedback.filter(Boolean):makeFeedback(reading,speaking);
  const me=db.users.find(u=>u.u===session.u);
  return {user:session.u,name:me?me.name:session.name,testId:T.id,testName:T.name,date:Date.now(),
    reading,speaking,overall,feedback:fb,engine:'AI examiner — '+db.settings.llmModel};
}
function makeFeedback(r,s){
  const fb=[];
  if(r.accuracy>0){ fb.push(r.accuracy<70?"Reading: read every word accurately and avoid skipping ahead.":"Reading: clear and accurate — keep your pace natural and steady.");
    if(r.wpm&&(r.wpm<100||r.wpm>185)) fb.push("Reading: your pace was about "+r.wpm+" words/min — aim for roughly 120–160 for a natural delivery."); }
  if(s.criteria){
    const lo=Object.entries(s.criteria).sort((a,b)=>a[1]-b[1])[0];
    const map={fluency:"Fluency & coherence — speak in longer connected stretches with fewer pauses.",
      lexical:"Vocabulary — use more varied, precise and topic-specific words.",
      grammar:"Grammar — vary sentence structures and watch tense consistency.",
      pron:"Pronunciation — speak clearly and reduce filler sounds (um, uh)."};
    fb.push("Speaking: "+(map[lo[0]]||"keep developing your answers."));
    if(s.relevance<35) fb.push("Speaking: focus more tightly on what each question is actually asking.");
    fb.push("Speaking: develop each answer with a reason and a brief example to lift your band.");
  }

}

      '<div class="field"><label>Unity WebGL URL (the build’s index.html)</label><input id="unityUrl" value="'+esc(db.settings.unityUrl||'')+'" placeholder="https://your-host/unity-avatar/index.html"/></div>'+
      '<button class="btn-primary" onclick="saveSettings()">Save</button>';
    host.appendChild(card);
  };
  var _ss=saveSettings;
  saveSettings=function(){ var u=document.getElementById('unityUrl'); if(u)db.settings.unityUrl=u.value.trim(); _ss(); };
  /* optional inbound signals from the Unity build */
  window.addEventListener('message',function(ev){ try{ var m=typeof ev.data==='string'?JSON.parse(ev.data):ev.data;
    if(m&&m.type==='unityReady') console.log('Unity avatar ready'); }catch(e){} });
})();
</script>

</body>
